events {}

http {
    upstream ielts_app {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;
        absolute_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Host business.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host business.local;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Ielts-Onion-Audience business;
        proxy_set_header Connection "";
        proxy_redirect off;

        location ~* ^/(api/admin|admin|internal|debug|metrics)(/|$) { return 404; }
        location ~* ^/api/auth/(login|register|totp|account)(/|$) { return 404; }
        location ~* ^/auth/(admin|password|totp|account)(/|$) { return 404; }

        location = / { proxy_pass http://ielts_app; }
        location = /index.html { proxy_pass http://ielts_app; }
        location = /api/health { proxy_pass http://ielts_app; }
        location = /api/site-content { proxy_pass http://ielts_app; }
        location = /api/auth/csrf { proxy_pass http://ielts_app; }
        location = /api/auth/me { proxy_pass http://ielts_app; }
        location = /api/auth/logout { proxy_pass http://ielts_app; }
        location = /api/account/sessions { proxy_pass http://ielts_app; }
        location = /api/account/sessions/revoke-others { proxy_pass http://ielts_app; }
        location ^~ /api/account/sessions/ { proxy_pass http://ielts_app; }
        location ^~ /api/practice-records { proxy_pass http://ielts_app; }

        location = /auth/business/start { proxy_pass http://ielts_app; }
        location = /auth/business/password/start { proxy_pass http://ielts_app; }
        location = /auth/business/totp/start { proxy_pass http://ielts_app; }
        location = /auth/business/callback { proxy_pass http://ielts_app; }
        location = /auth/business/logout { proxy_pass http://ielts_app; }
        location = /auth/admin/callback { proxy_pass http://ielts_app; }
        location = /auth/login { return 302 /auth/business/start?return_to=/; }
        location = /auth/login/ { return 302 /auth/business/start?return_to=/; }
        location ^~ /auth/ { return 404; }

        location ^~ /css/ { proxy_pass http://ielts_app; }
        location ^~ /js/ { proxy_pass http://ielts_app; }
        location ^~ /assets/images/ { proxy_pass http://ielts_app; }
        location ^~ /assets/vendor/ { proxy_pass http://ielts_app; }
        location ^~ /assets/scripts/ { proxy_pass http://ielts_app; }
        location ^~ /assets/wordlists/ { proxy_pass http://ielts_app; }
        location ^~ /assets/data/ { proxy_pass http://ielts_app; }
        location ^~ /assets/generated/ { proxy_pass http://ielts_app; }
        location ^~ /practice/ { proxy_pass http://ielts_app; }
        location ^~ /ListeningPractice/ { proxy_pass http://ielts_app; }

        location / { return 404; }
    }
}
